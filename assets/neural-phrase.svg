<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 490" width="900" height="490">
<defs>
  <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-strong" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
    <rect width="1" height="1" fill="#000" opacity="0.25"/>
  </pattern>
  <style>
    @keyframes flowConn {
      0%   { stroke-dashoffset: 50; opacity: 0.10; }
      50%  { opacity: 0.50; }
      100% { stroke-dashoffset: 0;  opacity: 0.10; }
    }
    @keyframes pulseNode {
      0%,100% { opacity: 0.45; }
      50%     { opacity: 1.00; }
    }
    @keyframes pulseOut {
      0%,100% { opacity: 0.55; }
      50%     { opacity: 1.00; }
    }
    @keyframes barWin {
      0%,100% { width: 130px; opacity: 0.85; }
      50%     { width: 158px; opacity: 1.00; }
    }
    @keyframes barB {
      0%,100% { width: 58px; opacity: 0.55; }
      50%     { width: 72px; opacity: 0.75; }
    }
    @keyframes barC {
      0%,100% { width: 38px; opacity: 0.45; }
      50%     { width: 50px; opacity: 0.65; }
    }
    @keyframes barD {
      0%,100% { width: 24px; opacity: 0.35; }
      50%     { width: 33px; opacity: 0.55; }
    }
    @keyframes barE {
      0%,100% { width: 12px; opacity: 0.30; }
      50%     { width: 19px; opacity: 0.45; }
    }
    @keyframes ci {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .conn { stroke-dasharray: 7 4; fill: none; animation: flowConn 2.8s linear infinite; }
    .l1   { stroke: #1a5c5c; stroke-width: 0.65; animation-duration: 2.5s; }
    .l2   { stroke: #1a7070; stroke-width: 0.65; animation-duration: 3.0s; }
    .l3   { stroke: #009999; stroke-width: 0.75; animation-duration: 2.3s; }
    .ni   { fill: #002929; stroke: #00cccc; stroke-width: 1.4; animation: pulseNode 2.6s ease-in-out infinite; }
    .nh   { fill: #001e1e; stroke: #009999; stroke-width: 1.1; animation: pulseNode 2.1s ease-in-out infinite; }
    .no   { fill: #001818; stroke: #00fff9; stroke-width: 1.8; animation: pulseOut  1.9s ease-in-out infinite; filter: url(#glow-cyan); }
    .bw   { fill: #00ff88; rx: 2; animation: barWin 2.5s ease-in-out infinite; }
    .bb   { fill: #cc00a0; animation: barB 2.5s ease-in-out infinite; }
    .bc   { fill: #aa007a; animation: barC 2.5s ease-in-out infinite; }
    .bd   { fill: #880060; animation: barD 2.5s ease-in-out infinite; }
    .be   { fill: #660048; animation: barE 2.5s ease-in-out infinite; }
    .lbl  { font-family: 'Courier New', monospace; font-size: 9px; fill: #005555; text-anchor: middle; }
    .xi   { font-family: 'Courier New', monospace; font-size: 9px; fill: #005555; text-anchor: end; }
    .ol   { font-family: 'Courier New', monospace; font-size: 11px; fill: #00cccc; }
    .ow   { font-family: 'Courier New', monospace; font-size: 11px; fill: #00fff9; filter: url(#glow-cyan); }
    .pv   { font-family: 'Courier New', monospace; font-size: 9px; }
    .c    { display: inline; opacity: 0; animation: ci 0.18s forwards ease-in;
            font-family: 'Courier New', monospace; font-size: 13.5px; color: #d0d0d0; }
  </style>
</defs>

<!-- Background -->
<rect width="900" height="490" fill="#0d0d0d"/>
<rect width="900" height="490" fill="url(#scanlines)"/>

<!-- Top label -->
<text x="450" y="22" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#005555" letter-spacing="3">NEURAL NET :: SOFTMAX LANGUAGE MODEL</text>

