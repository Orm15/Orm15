<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 390" width="860" height="390">
<defs>
  <style>
    @keyframes slideHeader {
      from { background-position: -860px 0; }
      to   { background-position: 860px 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glowBorder {
      0%,100% { box-shadow: 0 0 0 1px #21262d, 0 0 6px rgba(0,255,249,0.0); }
      50%      { box-shadow: 0 0 0 1px #30363d, 0 0 12px rgba(0,255,249,0.18); }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; }
    .wrap {
      background: #0d1117;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      padding: 0;
      height: 390px;
      overflow: hidden;
    }
    .header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid #21262d;
      position: relative;
      overflow: hidden;
    }
    .header-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, #00fff9 40%, #00ff88 60%, transparent);
      background-size: 860px 2px;
      animation: slideHeader 3s linear infinite;
      margin-bottom: 10px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: 0.3px;
    }
    .header-date {
      font-size: 11px;
      color: #7d8590;
      margin-top: 3px;
      font-family: 'Courier New', monospace;
    }
    .cards {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px 14px;
      opacity: 0;
      animation: fadeUp 0.5s ease-out forwards, glowBorder 3s ease-in-out infinite;
    }
    .card:nth-child(1) { animation-delay: 0.1s, 0.1s; }
    .card:nth-child(2) { animation-delay: 0.25s, 0.25s; }
    .card:nth-child(3) { animation-delay: 0.40s, 0.40s; }
    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .badge {
      font-size: 10px;
      font-family: 'Courier New', monospace;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 12px;
      letter-spacing: 0.5px;
    }
    .badge-ai  { background: #0d2d0d; color: #3fb950; border: 1px solid #1f6128; }
    .badge-lg  { background: #0d1a2d; color: #58a6ff; border: 1px solid #1c3a5c; }
    .badge-cv  { background: #2d0d2d; color: #bc8cff; border: 1px solid #5c1c5c; }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: #c9d1d9;
      line-height: 1.45;
      flex: 1;
    }
    .card-meta {
      font-size: 11px;
      color: #7d8590;
      font-family: 'Courier New', monospace;
      margin-top: 4px;
    }
  </style>
</defs>

<!-- Background -->
<rect width="860" height="390" fill="#0d1117" rx="10"/>

<!-- Content via foreignObject -->
<foreignObject x="0" y="0" width="860" height="390">
  <div xmlns="http://www.w3.org/1999/xhtml" class="wrap">
    <div class="header">
      <div class="header-line"/>
      <div class="header-title">&#129302; AI Papers Today</div>
      <div class="header-date"><!-- DATE -->March 15, 2026<!-- /DATE --></div>
    </div>
    <div class="cards">
<!-- PAPERS -->
<!-- /PAPERS -->
    </div>
  </div>
</foreignObject>
</svg>
